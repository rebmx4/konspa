workflows:
  ios-app-store:
    name: Konspa iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Конспа"
    environment:
      groups:
        - konspa_signing
      xcode: latest
      vars:
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.ryndin.konspa"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$CM_BUILD_DIR"
          xcodegen generate
      - name: Set up code signing (auto via ASC API key)
        script: |
          cd "$CM_BUILD_DIR"
          keychain initialize
          # Stable distribution-certificate private key from env (base64),
          # must persist across builds so the cert is never re-created.
          echo "$CERTIFICATE_PRIVATE_KEY" | openssl base64 -A -d -out /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create \
            --verbose
          keychain add-certificates
          echo "===== Applying profiles to project ====="
          xcode-project use-profiles --verbose
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR"
          # Always-increasing unique build number (epoch seconds) — never collides.
          BN=$(date +%s)
          agvtool new-version -all "$BN"
          echo "CFBundleVersion set to $BN"
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR"
          xcode-project build-ipa \
            --project "Konspa.xcodeproj" \
            --scheme "$XCODE_SCHEME" || {
              echo "===================================================="
              echo "===== BUILD FAILED — error lines from xcodebuild ====="
              echo "===================================================="
              grep -h -A3 "error:" /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -n 60
              echo "===== last 40 lines of xcodebuild log ====="
              tail -n 40 /tmp/xcodebuild_logs/*.log 2>/dev/null
              exit 1
            }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - rerebmx@gmail.com
        notify:
          success: true
          failure: true
